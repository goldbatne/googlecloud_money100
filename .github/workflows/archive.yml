name: GCP Data Lake Archive

on:
  schedule:
    - cron: '17 15 * * *' 
  workflow_dispatch: 

jobs:
  scrape_1_25:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Korean Fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - name: Install dependencies
        run: |
          npm install
          npm install md-to-pdf marked googleapis @google/generative-ai
      - name: Run GCP Archive Script (Rank 1~25)
        env:
          START_RANK: 1
          END_RANK: 25
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_1 }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GCP_REFRESH_TOKEN: ${{ secrets.GCP_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: node gcp_archive.js

  scrape_26_50:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Korean Fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - name: Install dependencies
        run: |
          npm install
          npm install md-to-pdf marked googleapis @google/generative-ai
      - name: Avoid Folder Creation Race Condition
        run: sleep 60
      - name: Run GCP Archive Script (Rank 26~50)
        env:
          START_RANK: 26
          END_RANK: 50
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_2 }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GCP_REFRESH_TOKEN: ${{ secrets.GCP_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: node gcp_archive.js

  scrape_51_75:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Korean Fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - name: Install dependencies
        run: |
          npm install
          npm install md-to-pdf marked googleapis @google/generative-ai
      - name: Avoid Folder Creation Race Condition
        run: sleep 120
      - name: Run GCP Archive Script (Rank 51~75)
        env:
          START_RANK: 51
          END_RANK: 75
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_3 }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GCP_REFRESH_TOKEN: ${{ secrets.GCP_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: node gcp_archive.js

  scrape_76_100:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Korean Fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - name: Install dependencies
        run: |
          npm install
          npm install md-to-pdf marked googleapis @google/generative-ai
      - name: Avoid Folder Creation Race Condition
        run: sleep 180
      - name: Run GCP Archive Script (Rank 76~100)
        env:
          START_RANK: 76
          END_RANK: 100
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_4 }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GCP_REFRESH_TOKEN: ${{ secrets.GCP_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: node gcp_archive.js

name: GCP Data Lake Archive

on:
  schedule:
    # UTC 21:00 = KST 06:00 (한국 시간 매일 새벽 5시 실행)
    - cron: '0 21 * * *' 
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      # 우분투 서버에 한글 폰트 강제 설치 (네트워크 폰트 다운로드 에러 원천 차단)
      - name: Install Korean Fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
        
      - name: Install dependencies
        run: |
          npm install
          npm install md-to-pdf
          
      - name: Run GCP Archive Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GCP_REFRESH_TOKEN: ${{ secrets.GCP_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: node gcp_archive.js

name: GCP Data Lake Archive

on:
  workflow_dispatch: # ★ 당장 버튼을 눌러 테스트하기 위한 수동 실행 전용

jobs:
  test_scrape_3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install Korean Fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
        
      - name: Install dependencies
        run: |
          npm install
          npm install md-to-pdf marked googleapis @google/generative-ai
          
      - name: Run GCP Archive Script (TEST Rank 1~3)
        env:
          START_RANK: 1
          END_RANK: 3 # ★ 정확히 3개만 추출하도록 물리적 차단
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_TOP }}
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GCP_REFRESH_TOKEN: ${{ secrets.GCP_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: node gcp_archive.js

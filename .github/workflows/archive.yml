name: GCP Data Lake Archive

on:
  schedule:
    # UTC 20:00 = KST 05:00 (한국 시간 매일 새벽 5시 실행)
    - cron: '0 20 * * *' 
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      # ★ PDF 변환 엔진(md-to-pdf) 설치 명령어 추가
      - name: Install dependencies
        run: |
          npm install
          npm install md-to-pdf
      - name: Run GCP Archive Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GCP_REFRESH_TOKEN: ${{ secrets.GCP_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: node gcp_archive.js

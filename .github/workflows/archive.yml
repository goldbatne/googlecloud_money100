name: GCP Data Lake Archive

on:
  schedule:
    - cron: '17 18 * * *' 
  workflow_dispatch: 

jobs:
  scrape_top_50:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install Korean Fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
        
      - name: Install dependencies
        run: |
          npm install
          npm install md-to-pdf marked googleapis @google/generative-ai
          
      - name: Run GCP Archive Script (Rank 1~50)
        env:
          START_RANK: 1
          END_RANK: 50
          # ★ Top 50 전용 API 키 풀 (5개)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_TOP }}
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GCP_REFRESH_TOKEN: ${{ secrets.GCP_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: node gcp_archive.js

  scrape_bottom_50:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install Korean Fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
        
      - name: Install dependencies
        run: |
          npm install
          npm install md-to-pdf marked googleapis @google/generative-ai

      - name: Avoid Folder Creation Race Condition
        run: |
          echo "Top 50 서버가 드라이브에 오늘 날짜 폴더를 안전하게 먼저 생성하도록 60초 대기합니다..."
          sleep 60
          
      - name: Run GCP Archive Script (Rank 51~100)
        env:
          START_RANK: 51
          END_RANK: 100
          # ★ Bottom 50 전용 API 키 풀 (5개)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_BOTTOM }}
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GCP_REFRESH_TOKEN: ${{ secrets.GCP_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: node gcp_archive.js
